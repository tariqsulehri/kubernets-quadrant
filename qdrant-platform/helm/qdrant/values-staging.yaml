# Qdrant Helm values for staging.
# This profile should stay close to production so backup, restore, and upgrade
# workflows are exercised against a realistic topology.

replicaCount: 3

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
  - host: qdrant-staging.tkxel.example.com
    paths:
    - path: /
      pathType: Prefix
      servicePort: 6333
  tls:
  - hosts:
    - qdrant-staging.tkxel.example.com
    secretName: qdrant-staging-tls

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 6

readinessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 6

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 4Gi

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - qdrant
          - key: app.kubernetes.io/instance
            operator: In
            values:
            - qdrant
        topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
  labelSelector:
    matchLabels:
      app.kubernetes.io/name: qdrant
      app.kubernetes.io/instance: qdrant
- maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway
  labelSelector:
    matchLabels:
      app.kubernetes.io/name: qdrant
      app.kubernetes.io/instance: qdrant

persistence:
  enabled: true
  accessModes:
  - ReadWriteOnce
  storageClassName: qdrant-fast-ssd
  size: 50Gi
  annotations: {}
  additionalLabels:
    app.kubernetes.io/component: vector-db
    app.kubernetes.io/environment: staging

snapshotPersistence:
  enabled: true
  accessModes:
  - ReadWriteOnce
  storageClassName: qdrant-snapshots
  size: 50Gi
  annotations: {}
  additionalLabels:
    app.kubernetes.io/environment: staging

config:
  cluster:
    enabled: true
    p2p:
      port: 6335
      enable_tls: false
    consensus:
      tick_period_ms: 100
  service:
    enable_tls: false

metrics:
  serviceMonitor:
    enabled: false
    scrapeInterval: 30s
    scrapeTimeout: 10s
    targetPort: http
    targetPath: /metrics

podManagementPolicy: OrderedReady

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

additionalLabels:
  app.kubernetes.io/environment: staging
